# Paste these location blocks INSIDE your server { } block in
# /etc/nginx/sites-available/user-management-app
# (update BOTH listen 80 and listen 443 ssl blocks if certbot created two).
#
# Easier: run the automated patch (updates every server { } block + writes the snippet):
#   sudo python3 scripts/patch-nginx-frontend.py
#   ./fix-nginx.sh
#
# REMOVE any old block like:
#   location /shyam_akaash {
#       alias /var/www/user-management-app/build;
#       try_files $uri $uri/ /shyam_akaash/index.html;
#   }

# Hashed JS/CSS — must NOT fall through to index.html (MIME type text/html bug).
location ^~ /shyam_akaash/static/ {
    alias /var/www/user-management-app/build/static/;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

location = /shyam_akaash {
    return 301 /shyam_akaash/;
}

location /shyam_akaash/ {
    root /var/www/user-management-app;
    try_files $uri $uri/ /shyam_akaash/index.html;
}
